name: CI/CD Pipeline (Node.js App)

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

# 2. VARIABLES DE ENTORNO
env:
  # Esta región es fija
  AWS_REGION: us-east-1 
  
  # ¡YA NO USAMOS VALORES FIJOS AQUÍ!
  # Usaremos los secretos de GitHub en los pasos de abajo.

jobs:
  build-and-push-to-ecr:
    name: Build y Push a ECR
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      image_tag: ${{ steps.set_vars.outputs.version_tag }}

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Extraer nombre de rama limpio
        id: extract_branch
        run: |
          RAW_BRANCH="${{ github.ref_name }}"
          CLEAN_BRANCH=$(echo "$RAW_BRANCH" | sed -E 's:^(feature/|hotfix/|bugfix/|release/)::' | tr '/' '-')
          echo "branch_name=$CLEAN_BRANCH" >> "$GITHUB_OUTPUT"

      - name: Definir variables de versión
        id: set_vars
        run: |
          VERSION_TAG="1.0.${{ github.run_number }}-${{ steps.extract_branch.outputs.branch_name }}"
          echo "version_tag=$VERSION_TAG" >> "$GITHUB_OUTPUT"
          
          # ¡ARREGLADO! Construye la URI usando los secretos
          echo "ecr_image_uri=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPOSITORY }}:$VERSION_TAG" >> "$GITHUB_OUTPUT"
          
          if [ "${{ github.ref_name }}" == "main" ]; then
            echo "latest_tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Configurar credenciales de AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Iniciar sesión en ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, y push a ECR
        env:
          # ¡ARREGLADO! Pasa las variables de secretos al script
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
        run: |
          IMAGE_URI_VERSIONED="${{ steps.set_vars.outputs.ecr_image_uri }}"
          
          echo "Construyendo y subiendo $IMAGE_URI_VERSIONED"
          docker build -t $IMAGE_URI_VERSIONED -f dockerfile .
          docker push $IMAGE_URI_VERSIONED
          
          if [ -n "${{ steps.set_vars.outputs.latest_tag }}" ]; then
            IMAGE_URI_LATEST="${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest"
            echo "Etiquetando y subiendo $IMAGE_URI_LATEST"
            docker tag $IMAGE_URI_VERSIONED $IMAGE_URI_LATEST
            docker push $IMAGE_URI_LATEST
          fi

  deploy-to-ec2:
    name: Desplegar en EC2
    runs-on: ubuntu-latest
    needs: build-and-push-to-ecr 
    if: github.ref == 'refs/heads/main'

    steps:
      - name: DEBUG - Verificar que los secretos existen
        run: |
          if [ -z "${{ secrets.AWS_ACCESS_KEY_ID }}" ]; then
            echo "❌ ERROR: El secreto AWS_ACCESS_KEY_ID NO está configurado o está vacío."
            exit 1
          else
            echo "ÉXITO: El secreto AWS_ACCESS_KEY_ID está cargado (oculto por seguridad)."
          fi

          if [ -z "${{ secrets.AWS_SECRET_ACCESS_KEY }}" ]; then
            echo "❌ ERROR: El secreto AWS_SECRET_ACCESS_KEY NO está configurado o está vacío."
            exit 1
          else
            echo "ÉXITO: El secreto AWS_SECRET_ACCESS_KEY está cargado (oculto por seguridad)."
          fi
      - name: Configurar credenciales de AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Iniciar sesión en ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Desplegar en EC2
        uses: appleboy/ssh-action@master
        with:
          # ¡ARREGLADO! Usa los secretos en lugar de env:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user # Asumiendo que usas 'ec2-user'
          key: ${{ secrets.EC2_SSH_KEY }} # ¡ARREGLADO! El nombre correcto
          
          # ¡ARREGLADO! Pasa los secretos al script
          script: |
            echo "Despliegue iniciado..."
            
            # 1. Iniciar sesión en ECR (en la instancia EC2)
            aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com
            
            # 2. Definir la URI de la imagen 'latest'
            IMAGE_URI="${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:latest"
            
            # 3. Hacer pull de la nueva imagen
            echo "Haciendo pull de $IMAGE_URI"
            docker pull $IMAGE_URI
            
            # 4. Detener y eliminar el contenedor anterior
            echo "Deteniendo contenedor 'prod-app' (si existe)..."
            docker stop prod-app || true
            docker rm prod-app || true
            
            # 5. Lanzar el nuevo contenedor
            echo "Lanzando nuevo contenedor..."
            docker run -d --name prod-app -p 3000:3000 \
              --restart always \
              -e ENVIRONMENT=prod \
              -e PORT=3000 \
              -e AWS_REGION=${{ env.AWS_REGION }} \
              -e BUCKET_NAME=${{ secrets.PROD_BUCKET_NAME }} \
              -e AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }} \
              -e AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }} \
              $IMAGE_URI
            
            echo "Despliegue completado."