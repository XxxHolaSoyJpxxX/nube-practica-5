name: Deploy Practica 5

permissions:
  id-token: write
  contents: read

on:
  push:
    branches:
      - "main"

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Install dependencies
        run: npm install

      - name: Build app
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: app
          path: .

  docker:
    runs-on: ubuntu-latest
    needs: build
    outputs:
      docker_image: ${{ steps.set_image.outputs.docker_image }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: app
          path: .

      - name: Set version tag
        run: echo "VERSION_TAG=1.0.${{ github.run_number }}" >> $GITHUB_ENV

      - name: Build Docker image
        run: |
            docker build -t practica5 .
            echo ${{ secrets.AWS_DEFAULT_REGION }}
      - run: echo "AWS KEY: ${{ secrets.AWS_ACCESS_KEY_ID }}"
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Tag final image
        id: set_image
        run: |
          IMAGE="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_DEFAULT_REGION }}.amazonaws.com/${{ secrets.ECR_REPOSITORY }}:$VERSION_TAG"
          docker tag practica5 $IMAGE
          echo "docker_image=$IMAGE" >> $GITHUB_OUTPUT

      - name: Push image to ECR
        run: docker push ${{ steps.set_image.outputs.docker_image }}

  deploy:
    runs-on: ubuntu-latest
    needs: docker

    steps:
      - name: Create SSH key
        run: |
          echo "${{ secrets.EC2_KEY }}" > key.pem
          chmod 600 key.pem

      - name: Deploy to EC2
        run: |
          IMAGE="${{ needs.docker.outputs.docker_image }}"

          ssh -o StrictHostKeyChecking=no -i key.pem ubuntu@${{ secrets.EC2_HOST }} << EOF
            aws ecr get-login-password --region ${{ secrets.AWS_DEFAULT_REGION }} \
              | docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_DEFAULT_REGION }}.amazonaws.com

            docker pull $IMAGE
            docker stop practica5 || true
            docker rm practica5 || true

            docker run -d \
              -p 3000:3000 \
              --env-file /home/ubuntu/.env.prod \
              --name practica5 \
              $IMAGE
          EOF
