name: Deploy Practica 5

permissions:
  id-token: write
  contents: read

on:
  push:
    branches: ["main"]

env:
  AWS_REGION: us-east-1

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Install dependencies
        run: npm install
      
      - name: Build
        run: npm run build


  docker:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: docker build -t practica5 .

      - name: Tag image
        run: |
          TAG=$(date +%s)
          echo "TAG=$TAG" >> $GITHUB_ENV
          docker tag practica5:latest ${{ secrets.ECR_URL }}:latest
          docker tag practica5:latest ${{ secrets.ECR_URL }}:$TAG

      - name: Push image
        run: |
          docker push ${{ secrets.ECR_URL }}:latest
          docker push ${{ secrets.ECR_URL }}:${{ env.TAG }}


  deploy:
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            docker pull ${{ secrets.ECR_URL }}:latest
            docker stop practica5 || true
            docker rm practica5 || true
            docker run -d \
              -p 3000:3000 \
              --env-file /home/ubuntu/.env.prod \
              --name practica5 \
              ${{ secrets.ECR_URL }}:latest
