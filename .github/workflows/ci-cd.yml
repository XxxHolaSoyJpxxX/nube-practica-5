name: CI/CD Practica 5

on:
  push:
    branches: ["main", "master"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Install dependencies
        run: npm install

      - name: Build TypeScript
        run: npm run build


  docker:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          docker build -t practica5-app .

      - name: Tag image
        run: |
          TAG=$(date +%Y%m%d%H%M%S)
          docker tag practica5-app:latest ${{ secrets.ECR_URL }}:latest
          docker tag practica5-app:latest ${{ secrets.ECR_URL }}:$TAG
          echo "TAG=$TAG" >> $GITHUB_ENV

      - name: Push image to ECR
        run: |
          docker push ${{ secrets.ECR_URL }}:latest
          docker push ${{ secrets.ECR_URL }}:${{ env.TAG }}


  deploy:
    runs-on: ubuntu-latest
    needs: docker

    steps:
      - name: Deploy on EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            docker pull ${{ secrets.ECR_URL }}:latest
            docker stop practica5 || true
            docker rm practica5 || true
            docker run -d \
              --name practica5 \
              --env-file /home/ubuntu/.env.prod \
              -p 3000:3000 \
              ${{ secrets.ECR_URL }}:latest
